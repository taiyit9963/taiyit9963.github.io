<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — Lousbite</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <a href="index.html" class="logo"><img src="images/logo.png" alt="Lousbite" class="logo-img"></a>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="catalogo.html">Catálogo</a>
      <a href="calendario.html">Calendario</a>
      <a href="https://www.instagram.com/lousbite/" target="_blank" class="nav-link-ig" aria-label="Instagram de Lousbite">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>

    </nav>
  </header>

  <main>
    <h1 style="text-align:center;padding:2rem 1rem 0;color:var(--cafe-oscuro);display:flex;align-items:center;justify-content:center;gap:0.5rem;">
      <img src="images/personaje.png" alt="Personaje Lousbite" style="height:50px;width:auto;">
      Nuestro Catálogo
    </h1>
    <div class="grid-productos" id="catalogo">
      <p style="text-align:center;padding:2rem;color:var(--texto-claro);">Cargando productos...</p>
    </div>
  </main>

  <!-- Modal para ver producto en grande -->
  <div class="modal-overlay" id="producto-modal" onclick="cerrarModal(event)">
    <div class="modal-content">
      <button class="modal-close" onclick="cerrarModal()">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer>
    <p>🍪 Lousbite — Hecho con amor</p>
    <p>📞 <a href="tel:30959661">30959661</a> | 📞 <a href="tel:57714771">57714771</a></p>
  </footer>

  <script src="js/public.js?v=2"></script>
</body>
</html>
