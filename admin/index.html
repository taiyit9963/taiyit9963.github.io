<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Lousbite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f2ed;
      color: #3a2a1a;
      min-height: 100vh;
    }
    a { color: #6b4e3a; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Login ─── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 1rem;
    }
    .login-box {
      background: #fff; border-radius: 16px; padding: 2.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      width: 100%; max-width: 380px; text-align: center;
    }
    .login-box h1 { font-size: 1.5rem; margin-bottom: .25rem; }
    .login-box p { color: #8a7a6a; margin-bottom: 1.5rem; font-size: .9rem; }
    .login-box input {
      width: 100%; padding: .75rem 1rem; border: 1px solid #ddd;
      border-radius: 8px; font-size: 1rem; margin-bottom: 1rem;
    }
    .login-box input:focus { outline: none; border-color: #6b4e3a; }
    .login-box .error { color: #c0392b; font-size: .85rem; margin-bottom: .75rem; }

    /* ─── App layout ─── */
    #app { display: none; }
    #app.visible { display: block; }

    /* ─── Header ─── */
    header {
      background: #fff; padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #e8e0d8; position: sticky; top: 0; z-index: 10;
    }
    header h2 { font-size: 1.2rem; font-weight: 600; }
    header .user { display: flex; align-items: center; gap: .75rem; }
    header .user span { color: #8a7a6a; font-size: .85rem; }
    .btn-logout {
      background: none; border: 1px solid #ddd; padding: .4rem .85rem;
      border-radius: 6px; cursor: pointer; font-size: .8rem; color: #6b4e3a;
    }
    .btn-logout:hover { background: #f5f2ed; }

    /* ─── Dashboard ─── */
    .dashboard { max-width: 700px; margin: 2rem auto; padding: 0 1.5rem; }
    .dashboard h3 { font-size: 1.1rem; color: #6b4e3a; margin-bottom: 1rem; }
    .cards { display: flex; flex-direction: column; gap: .75rem; }
    .card {
      background: #fff; border-radius: 12px; padding: 1.25rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; border: 1px solid #e8e0d8;
      transition: box-shadow .15s;
    }
    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .card-left { display: flex; align-items: center; gap: .75rem; }
    .card-icon { font-size: 1.6rem; }
    .card-title { font-weight: 600; font-size: 1rem; }
    .card-desc { font-size: .82rem; color: #8a7a6a; }
    .card-arrow { color: #bbb; font-size: 1.2rem; }

    /* ─── Editor ─── */
    .editor { max-width: 800px; margin: 1.5rem auto; padding: 0 1.5rem; }
    .editor-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; flex-wrap: wrap; gap: .5rem;
    }
    .editor-top h3 { font-size: 1.1rem; }
    .editor-actions { display: flex; gap: .5rem; }
    .editor-status {
      font-size: .82rem; color: #8a7a6a; padding: .35rem .75rem;
      background: #f0ebe5; border-radius: 6px;
    }
    .editor-status.ok { background: #e8f5e9; color: #2e7d32; }
    .editor-status.err { background: #fbe9e7; color: #c62828; }

    /* ─── Items ─── */
    .item {
      background: #fff; border-radius: 10px; padding: 1rem 1.25rem;
      margin-bottom: .6rem; border: 1px solid #eee;
    }
    .item-header {
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer;
    }
    .item-title { font-weight: 500; font-size: .95rem; }
    .item-sub { font-size: .82rem; color: #8a7a6a; margin-top: 2px; }
    .item-actions { display: flex; gap: .35rem; }
    .item-actions button {
      background: none; border: none; cursor: pointer; padding: .3rem .5rem;
      border-radius: 4px; font-size: .82rem;
    }
    .item-actions .edit { color: #6b4e3a; }
    .item-actions .edit:hover { background: #f5f2ed; }
    .item-actions .del { color: #c0392b; }
    .item-actions .del:hover { background: #fbe9e7; }

    .item-form { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #eee; }
    .item-form.open { display: block; }
    .form-row { margin-bottom: .75rem; }
    .form-row label { display: block; font-size: .82rem; color: #6b4e3a; font-weight: 500; margin-bottom: .25rem; }
    .form-row input, .form-row textarea, .form-row select {
      width: 100%; padding: .55rem .75rem; border: 1px solid #ddd;
      border-radius: 6px; font-size: .9rem; font-family: inherit;
    }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
      outline: none; border-color: #6b4e3a;
    }
    .form-row textarea { min-height: 60px; resize: vertical; }
    .form-row input[type="checkbox"] { width: auto; }
    .form-row .checkbox-label { display: flex; align-items: center; gap: .5rem; cursor: pointer; }
    .form-row .checkbox-label input { margin: 0; }

    /* ─── Buttons ─── */
    .btn {
      padding: .55rem 1.1rem; border: none; border-radius: 8px;
      font-size: .85rem; font-weight: 500; cursor: pointer;
      transition: background .15s;
    }
    .btn-primary { background: #6b4e3a; color: #fff; }
    .btn-primary:hover { background: #5a3f2d; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary { background: #eee; color: #3a2a1a; }
    .btn-secondary:hover { background: #ddd; }
    .btn-success { background: #2e7d32; color: #fff; }
    .btn-success:hover { background: #1b5e20; }
    .btn-outline { background: none; border: 1px solid #ddd; color: #6b4e3a; }
    .btn-outline:hover { background: #f5f2ed; }

    /* ─── Loading ─── */
    .loading { text-align: center; padding: 3rem; color: #8a7a6a; }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: #3a2a1a; color: #fff; padding: .75rem 1.25rem;
      border-radius: 8px; font-size: .85rem; z-index: 100;
      opacity: 0; transform: translateY(10px);
      transition: all .2s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok { background: #2e7d32; }
    .toast.err { background: #c0392b; }

    /* ─── Empty state ─── */
    .empty { text-align: center; padding: 2rem; color: #8a7a6a; font-size: .9rem; }
  </style>
</head>
<body>

<!-- ─── Login ─── -->
<div id="login-screen">
  <div class="login-box">
    <h1>🍪 Lousbite</h1>
    <p>Panel de administración</p>
    <input type="password" id="password-input" placeholder="Contraseña" autofocus />
    <div class="error" id="login-error"></div>
    <button class="btn btn-primary" id="login-btn" style="width:100%">Ingresar</button>
  </div>
</div>

<!-- ─── App ─── -->
<div id="app">
  <header>
    <h2>🍪 Lousbite</h2>
    <div class="user">
      <span id="status-text">Listo</span>
      <button class="btn-logout" id="logout-btn">Salir</button>
    </div>
  </header>

  <div id="dashboard-view" class="dashboard">
    <h3>¿Qué querés editar?</h3>
    <div class="cards" id="cards-container"></div>
  </div>

  <div id="editor-view" class="editor" style="display:none">
    <div class="editor-top">
      <div>
        <a href="#" id="back-link" style="font-size:.82rem;color:#8a7a6a">← Volver</a>
        <h3 id="editor-title" style="margin-top:.25rem"></h3>
      </div>
      <div class="editor-actions">
        <span class="editor-status" id="editor-status"></span>
        <button class="btn btn-outline" id="add-btn">+ Agregar</button>
        <button class="btn btn-primary" id="save-btn">💾 Guardar</button>
      </div>
    </div>
    <div id="items-container"></div>
    <div class="loading" id="editor-loading">Cargando...</div>
  </div>
</div>

<!-- ─── Toast ─── -->
<div class="toast" id="toast"></div>

<!-- ─── File input oculto para subir imágenes ─── -->
<input type="file" id="file-input" accept="image/*" style="display:none" />

<script>
const API = 'https://lousbite-admin.andululze.workers.dev';

const COLLECTIONS = {
  productos: {
    label: 'Productos',
    icon: '📦',
    desc: 'Catálogo de productos',
    fields: [
      { name: 'id', label: 'ID', type: 'number' },
      { name: 'nombre', label: 'Nombre', type: 'string', required: true },
      { name: 'descripcion', label: 'Descripción', type: 'text' },
      { name: 'precio', label: 'Precio ($)', type: 'number', step: '0.01' },
      { name: 'imagen_url', label: 'Imagen', type: 'string', widget: 'image' },
      { name: 'disponible', label: 'Disponible', type: 'boolean' },
    ],
  },
  posts: {
    label: 'Posts',
    icon: '📝',
    desc: 'Timeline de la página principal',
    fields: [
      { name: 'id', label: 'ID', type: 'number' },
      { name: 'imagen_url', label: 'Imagen', type: 'string', widget: 'image' },
      { name: 'texto', label: 'Texto', type: 'text' },
      { name: 'precio', label: 'Precio ($)', type: 'number', step: '0.01' },
      { name: 'fecha_publicacion', label: 'Fecha', type: 'date', required: true },
    ],
  },
  calendario: {
    label: 'Calendario',
    icon: '📅',
    desc: 'Días de venta y eventos',
    fields: [
      { name: 'id', label: 'ID', type: 'number' },
      { name: 'fecha', label: 'Fecha', type: 'date', required: true },
      {
        name: 'tipo', label: 'Tipo', type: 'select',
        options: [
          { value: 'venta', label: '💚 Venta' },
          { value: 'especial', label: '💛 Especial' },
          { value: 'feriado', label: '❤️ Feriado / Sin venta' },
        ],
      },
      { name: 'descripcion', label: 'Descripción', type: 'string' },
    ],
  },
};

// ─── State ───
let currentCollection = null;
let items = [];
let sha = null;
let password = sessionStorage.getItem('lousbite_pass') || '';

// ─── DOM refs ───
const loginScreen = document.getElementById('login-screen');
const app = document.getElementById('app');
const passInput = document.getElementById('password-input');
const loginError = document.getElementById('login-error');
const loginBtn = document.getElementById('login-btn');
const logoutBtn = document.getElementById('logout-btn');
const backLink = document.getElementById('back-link');
const editorTitle = document.getElementById('editor-title');
const editorStatus = document.getElementById('editor-status');
const cardsContainer = document.getElementById('cards-container');
const itemsContainer = document.getElementById('items-container');
const editorLoading = document.getElementById('editor-loading');
const dashboardView = document.getElementById('dashboard-view');
const editorView = document.getElementById('editor-view');
const statusText = document.getElementById('status-text');
const addBtn = document.getElementById('add-btn');
const saveBtn = document.getElementById('save-btn');
const toastEl = document.getElementById('toast');

// ─── Helpers ───
function showToast(msg, type = 'ok') {
  toastEl.textContent = msg;
  toastEl.className = `toast ${type} show`;
  setTimeout(() => toastEl.classList.remove('show'), 2500);
}

function setStatus(text, cls = '') {
  statusText.textContent = text;
}

function clr(name, value) {
  if (value === undefined || value === null) return '';
  if (typeof value === 'boolean') return value ? '✅ Sí' : '❌ No';
  return String(value);
}

// ─── API ───
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      Authorization: 'Bearer ' + password,
      ...opts.headers,
    },
    ...opts,
  });
  return res;
}

// ─── Login ───
async function doLogin() {
  const pwd = passInput.value;
  loginError.textContent = '';
  loginBtn.disabled = true;
  loginBtn.textContent = 'Ingresando...';

  try {
    const res = await api('/api/login', {
      method: 'POST',
      body: JSON.stringify({ password: pwd }),
    });
    const data = await res.json();

    if (!data.success) {
      loginError.textContent = data.error || 'Error al iniciar sesión';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Ingresar';
      return;
    }

    password = pwd;
    sessionStorage.setItem('lousbite_pass', password);
    loginScreen.style.display = 'none';
    app.classList.add('visible');
    showDashboard();
  } catch (e) {
    loginError.textContent = 'Error de conexión con el servidor';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Ingresar';
  }
}

passInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
loginBtn.addEventListener('click', doLogin);

logoutBtn.addEventListener('click', () => {
  password = '';
  sessionStorage.removeItem('lousbite_pass');
  app.classList.remove('visible');
  loginScreen.style.display = 'flex';
  passInput.value = '';
  passInput.focus();
});

// ─── Dashboard ───
function showDashboard() {
  currentCollection = null;
  dashboardView.style.display = 'block';
  editorView.style.display = 'none';
  setStatus('Listo');

  cardsContainer.innerHTML = '';
  for (const [key, col] of Object.entries(COLLECTIONS)) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-left">
        <span class="card-icon">${col.icon}</span>
        <div>
          <div class="card-title">${col.label}</div>
          <div class="card-desc">${col.desc}</div>
        </div>
      </div>
      <span class="card-arrow">→</span>
    `;
    card.addEventListener('click', () => openEditor(key));
    cardsContainer.appendChild(card);
  }
}

// ─── Editor ───
async function openEditor(key) {
  currentCollection = key;
  const col = COLLECTIONS[key];
  dashboardView.style.display = 'none';
  editorView.style.display = 'block';
  editorTitle.textContent = `${col.icon} ${col.label}`;
  itemsContainer.innerHTML = '';
  editorLoading.style.display = 'block';
  editorStatus.textContent = 'Cargando...';
  editorStatus.className = 'editor-status';
  saveBtn.disabled = true;
  addBtn.disabled = true;
  setStatus(`Cargando ${col.label}...`);

  try {
    const res = await api(`/api/data/${key}`);
    const data = await res.json();

    if (!res.ok) {
      showToast(data.error || 'Error al cargar', 'err');
      editorLoading.style.display = 'none';
      editorStatus.textContent = 'Error';
      editorStatus.className = 'editor-status err';
      setStatus('Error');
      return;
    }

    items = data.data?.lista || [];
    sha = data.sha || null;
    if (key === 'calendario') {
      renderCalendario();
      addBtn.style.display = 'none';
    } else {
      renderItems();
      addBtn.style.display = '';
    }
    editorLoading.style.display = 'none';
    editorStatus.textContent = `${items.length} ${key === 'calendario' ? 'fecha(s)' : 'item(s)'}`;
    editorStatus.className = 'editor-status ok';
    saveBtn.disabled = false;
    addBtn.disabled = currentCollection === 'calendario';
    setStatus('Listo');
  } catch (e) {
    showToast('Error de conexión', 'err');
    editorLoading.style.display = 'none';
    editorStatus.textContent = 'Error';
    editorStatus.className = 'editor-status err';
  }
}

backLink.addEventListener('click', e => {
  e.preventDefault();
  showDashboard();
});

// ─── Render Items ───
function renderItems() {
  const col = COLLECTIONS[currentCollection];
  if (!col) return;
  itemsContainer.innerHTML = '';

  if (items.length === 0) {
    itemsContainer.innerHTML = '<div class="empty">No hay items todavía. Hacé clic en "+ Agregar"</div>';
    return;
  }

  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'item';

    // title
    const titleField = col.fields.find(f => f.name === 'nombre' || f.name === 'fecha');
    const title = titleField ? clr(item[titleField.name]) : `#${item.id || idx + 1}`;
    const sub = item.nombre ? '' : (item.texto ? item.texto.slice(0, 60) + (item.texto.length > 60 ? '...' : '') : '');

    div.innerHTML = `
      <div class="item-header" data-idx="${idx}">
        <div>
          <div class="item-title">${title || `Item #${idx + 1}`}</div>
          ${sub ? `<div class="item-sub">${sub}</div>` : ''}
        </div>
        <div class="item-actions">
          <button class="edit" data-idx="${idx}">✏️ Editar</button>
          <button class="del" data-idx="${idx}">🗑️</button>
        </div>
      </div>
      <div class="item-form" data-idx="${idx}"></div>
    `;

    // Form
    const form = div.querySelector('.item-form');
    form.innerHTML = col.fields.map(f => {
      const val = item[f.name];
      if (f.type === 'boolean') {
        return `<div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" name="${f.name}" ${val ? 'checked' : ''} />
            ${f.label}
          </label>
        </div>`;
      }
      if (f.type === 'select') {
        const opts = f.options.map(o =>
          `<option value="${o.value}" ${val === o.value ? 'selected' : ''}>${o.label}</option>`
        ).join('');
        return `<div class="form-row">
          <label for="f-${idx}-${f.name}">${f.label}</label>
          <select id="f-${idx}-${f.name}" name="${f.name}">${opts}</select>
        </div>`;
      }
      if (f.type === 'text') {
        return `<div class="form-row">
          <label for="f-${idx}-${f.name}">${f.label}</label>
          <textarea id="f-${idx}-${f.name}" name="${f.name}">${clr(val)}</textarea>
        </div>`;
      }
      if (f.type === 'number') {
        return `<div class="form-row">
          <label for="f-${idx}-${f.name}">${f.label}</label>
          <input type="number" id="f-${idx}-${f.name}" name="${f.name}" value="${clr(val)}" step="${f.step || '1'}" />
        </div>`;
      }
      if (f.type === 'date') {
        return `<div class="form-row">
          <label for="f-${idx}-${f.name}">${f.label}</label>
          <input type="date" id="f-${idx}-${f.name}" name="${f.name}" value="${clr(val)}" />
        </div>`;
      }
      if (f.widget === 'image') {
        return `<div class="form-row">
          <label for="f-${idx}-${f.name}">${f.label}</label>
          <div style="display:flex;gap:.5rem">
            <input type="text" id="f-${idx}-${f.name}" name="${f.name}" value="${clr(val).replace(/"/g, '&quot;')}" style="flex:1" placeholder="URL o subí una imagen" />
            <button type="button" class="btn btn-outline upload-btn" data-idx="${idx}" data-field="${f.name}" style="white-space:nowrap">📁 Subir</button>
          </div>
        </div>`;
      }
      return `<div class="form-row">
        <label for="f-${idx}-${f.name}">${f.label}</label>
        <input type="text" id="f-${idx}-${f.name}" name="${f.name}" value="${clr(val).replace(/"/g, '&quot;')}" />
      </div>`;
    }).join('');

    // Toggle form
    const header = div.querySelector('.item-header');
    header.addEventListener('click', e => {
      if (e.target.closest('.item-actions')) return;
      form.classList.toggle('open');
    });

    // Edit button
    div.querySelector('.edit').addEventListener('click', e => {
      e.stopPropagation();
      form.classList.toggle('open');
    });

    // Delete button
    div.querySelector('.del').addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm(`¿Eliminar "${title || `item #${idx + 1}`}"?`)) return;
      items.splice(idx, 1);
      renderItems();
      editorStatus.textContent = `${items.length} item(s) · sin guardar`;
      setStatus('Hay cambios sin guardar');
    });

    itemsContainer.appendChild(div);
  });
}

// ─── Calendario visual ───
function renderCalendario() {
  const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
    'Julio', 'Agosto', 'Setiembre', 'Octubre', 'Noviembre', 'Diciembre'];

  let calMes = new Date().getMonth();
  let calAnio = new Date().getFullYear();

  function buildCal() {
    const diasSemana = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
    const primerDia = new Date(calAnio, calMes, 1);
    const ultimoDia = new Date(calAnio, calMes + 1, 0);
    const diasEnMes = ultimoDia.getDate();
    const diaInicio = primerDia.getDay();

    let html = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-outline" id="cal-prev">← ${meses[(calMes + 11) % 12]}</button>
        <strong style="font-size:1.1rem">${meses[calMes]} ${calAnio}</strong>
        <button class="btn btn-outline" id="cal-next">${meses[(calMes + 1) % 12]} →</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
        ${diasSemana.map(d => `<div style="text-align:center;font-size:.78rem;color:#8a7a6a;padding:.25rem 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
    `;

    for (let i = 0; i < diaInicio; i++) html += '<div></div>';

    for (let dia = 1; dia <= diasEnMes; dia++) {
      const fechaStr = `${calAnio}-${String(calMes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
      const entrada = items.find(d => d.fecha?.substring(0, 10) === fechaStr);

      let bg = '#f5f2ed';
      let label = '';
      let tipo = entrada?.tipo || '';

      if (tipo === 'venta') { bg = '#c8e6c9'; label = '💚'; }
      else if (tipo === 'especial') { bg = '#fff9c4'; label = '💛'; }
      else if (tipo === 'feriado') { bg = '#ffcdd2'; label = '❤️'; }

      const desc = entrada?.descripcion ? entrada.descripcion : '';
      html += `<div class="cal-day" data-fecha="${fechaStr}" data-tipo="${tipo}"
        style="aspect-ratio:1;background:${bg};border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;font-weight:500;border:2px solid transparent"
        title="${desc || fechaStr}">
        <span>${dia}</span>
        ${label ? `<span style="font-size:.75rem;line-height:1">${label}</span>` : ''}
      </div>`;
    }

    html += '</div>';

    // Leyenda
    html += `
      <div style="display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;font-size:.82rem">
        <span style="display:flex;align-items:center;gap:.3rem"><span style="display:inline-block;width:14px;height:14px;background:#c8e6c9;border-radius:3px"></span> Venta</span>
        <span style="display:flex;align-items:center;gap:.3rem"><span style="display:inline-block;width:14px;height:14px;background:#fff9c4;border-radius:3px"></span> Especial</span>
        <span style="display:flex;align-items:center;gap:.3rem"><span style="display:inline-block;width:14px;height:14px;background:#ffcdd2;border-radius:3px"></span> Sin venta</span>
        <span style="display:flex;align-items:center;gap:.3rem"><span style="display:inline-block;width:14px;height:14px;background:#f5f2ed;border-radius:3px;border:1px solid #ddd"></span> Sin definir</span>
      </div>
      <p style="font-size:.8rem;color:#8a7a6a;margin-top:.5rem">💡 Hacé clic en un día para cambiar: vacío → 💚 Venta → 💛 Especial → ❤️ Sin venta → vacío</p>
    `;

    itemsContainer.innerHTML = html;

    // Clicks en días
    document.querySelectorAll('.cal-day').forEach(el => {
      el.addEventListener('click', () => {
        const fecha = el.dataset.fecha;
        const tipoActual = el.dataset.tipo;
        let newTipo;
        if (!tipoActual) newTipo = 'venta';
        else if (tipoActual === 'venta') newTipo = 'especial';
        else if (tipoActual === 'especial') newTipo = 'feriado';
        else newTipo = '';

        const idx = items.findIndex(d => d.fecha?.substring(0, 10) === fecha);

        if (!newTipo) {
          if (idx !== -1) items.splice(idx, 1);
        } else {
          const maxId = items.length > 0 ? Math.max(...items.map(i => i.id || 0)) : 0;
          if (idx !== -1) {
            items[idx].tipo = newTipo;
          } else {
            items.push({ id: maxId + 1, fecha, tipo: newTipo, descripcion: '' });
          }
        }

        editorStatus.textContent = `${items.length} fecha(s) · sin guardar`;
        setStatus('Hay cambios sin guardar');
        buildCal();
      });
    });

    document.getElementById('cal-prev')?.addEventListener('click', () => {
      calMes--; if (calMes < 0) { calMes = 11; calAnio--; }
      buildCal();
    });
    document.getElementById('cal-next')?.addEventListener('click', () => {
      calMes++; if (calMes > 11) { calMes = 0; calAnio++; }
      buildCal();
    });
  }

  buildCal();
}

// ─── Add Item ───
addBtn.addEventListener('click', () => {
  const col = COLLECTIONS[currentCollection];
  if (!col) return;
  const empty = {};
  col.fields.forEach(f => {
    if (f.type === 'boolean') empty[f.name] = true;
    else if (f.type === 'number') empty[f.name] = null;
    else empty[f.name] = '';
  });
  if (col.fields.some(f => f.name === 'id')) {
    empty.id = items.length > 0 ? Math.max(...items.map(i => i.id || 0)) + 1 : 1;
  }
  items.push(empty);
  renderItems();
  // Auto-open last item
  const lastForm = itemsContainer.querySelector('.item:last-child .item-form');
  if (lastForm) lastForm.classList.add('open');
  editorStatus.textContent = `${items.length} item(s) · sin guardar`;
  setStatus('Hay cambios sin guardar');
});

// ─── Save ───
saveBtn.addEventListener('click', async () => {
  const col = COLLECTIONS[currentCollection];
  if (!col) return;

  // Collect form data
  const forms = itemsContainer.querySelectorAll('.item-form');
  forms.forEach((form, idx) => {
    if (idx >= items.length) return;
    col.fields.forEach(f => {
      const el = form.querySelector(`[name="${f.name}"]`);
      if (!el) return;
      if (f.type === 'boolean') items[idx][f.name] = el.checked;
      else if (f.type === 'number') items[idx][f.name] = el.value ? parseFloat(el.value) : null;
      else items[idx][f.name] = el.value;
    });
  });

  saveBtn.disabled = true;
  saveBtn.textContent = 'Guardando...';
  setStatus('Guardando...');

  try {
    const res = await api(`/api/data/${currentCollection}`, {
      method: 'POST',
      body: JSON.stringify({ data: { lista: items }, sha }),
    });
    const data = await res.json();

    if (!data.success) {
      showToast(data.error || 'Error al guardar', 'err');
      setStatus('Error al guardar');
      saveBtn.disabled = false;
      saveBtn.textContent = '💾 Guardar';
      return;
    }

    sha = data.sha || sha;
    showToast('✅ Guardado correctamente');
    editorStatus.textContent = `${items.length} item(s)`;
    setStatus('Listo');
    saveBtn.disabled = false;
    saveBtn.textContent = '💾 Guardar';
  } catch (e) {
    showToast('Error de conexión', 'err');
    setStatus('Error');
    saveBtn.disabled = false;
    saveBtn.textContent = '💾 Guardar';
  }
});

// ─── Subir imagen ───
let uploadTarget = null; // { idx, field }

const fileInput = document.getElementById('file-input');

itemsContainer.addEventListener('click', e => {
  const btn = e.target.closest('.upload-btn');
  if (!btn) return;
  uploadTarget = { idx: parseInt(btn.dataset.idx), field: btn.dataset.field };
  fileInput.click();
});

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file || !uploadTarget) return;

  // Leer archivo como base64
  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(',')[1]; // sacar "data:image/...;base64,"

    setStatus('Subiendo imagen...');
    try {
      const res = await api('/api/upload', {
        method: 'POST',
        body: JSON.stringify({ filename: file.name, content: base64 }),
      });
      const data = await res.json();
      if (!data.success) {
        showToast(data.error || 'Error al subir', 'err');
        setStatus('Error');
        return;
      }

      // Llenar el campo URL
      const input = document.querySelector(
        `.item:nth-child(${uploadTarget.idx + 1}) .item-form input[name="${uploadTarget.field}"]`
      );
      if (input) input.value = data.url;
      showToast('✅ Imagen subida');
      setStatus('Imagen lista');
    } catch (e) {
      showToast('Error de conexión al subir', 'err');
      setStatus('Error');
    }
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

// ─── Init ───
if (password) {
  // Try to login with stored password
  (async () => {
    try {
      const res = await api('/api/login', {
        method: 'POST',
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (data.success) {
        loginScreen.style.display = 'none';
        app.classList.add('visible');
        showDashboard();
        return;
      }
    } catch (_) {}
    sessionStorage.removeItem('lousbite_pass');
    password = '';
  })();
}
</script>
